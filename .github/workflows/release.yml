name: Release

on:
  push:
    branches:
      - main
      - next

concurrency: ${{ github.workflow }}-${{ github.ref }}

# Add workflow-level permissions
permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write # Required for trusted publishing with OIDC

jobs:
  release:
    name: Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          commit: 'chore(release): version package'
          title: 'chore(release): version package'
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Publish to npm with trusted publishing
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          # Strip the auth token that setup-node added so npm uses OIDC instead
          echo "registry=https://registry.npmjs.org/" > "$NPM_CONFIG_USERCONFIG"
          # Build the package
          pnpm prepack
          # Publish directly via npm so the native OIDC exchange works
          npm publish --provenance --access public
